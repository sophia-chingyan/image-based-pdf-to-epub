<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OCR for Imaged PDF</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --ink:#1a1614;--paper:#f5f0e8;--cream:#fffdf8;--red:#c0392b;--red-dim:#8b2a1f;
      --green:#27624a;--amber:#c07000;--blue:#2563eb;--muted:#7a6e65;--border:#d4c9b8;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:var(--paper);color:var(--ink);font-family:'Shippori Mincho',serif}
    body::before{content:'';position:fixed;inset:0;background-image:repeating-linear-gradient(90deg,transparent,transparent 80px,rgba(0,0,0,.03) 80px,rgba(0,0,0,.03) 81px);pointer-events:none;z-index:0}
    .container{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:2rem 1.5rem 4rem}
    header{display:flex;align-items:baseline;justify-content:space-between;padding:2rem 0 1.5rem;border-bottom:1px solid var(--border);margin-bottom:2rem}
    .brand{display:flex;align-items:baseline;gap:.75rem}
    .brand-mark{font-size:2.2rem;color:var(--red);line-height:1}
    .brand-title{font-size:1.15rem;font-weight:800;letter-spacing:.03em}
    .brand-sub{font-family:'DM Mono',monospace;font-size:.68rem;font-weight:300;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-left:.25rem}
    .logout-btn{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted);text-decoration:none;letter-spacing:.08em;border-bottom:1px solid transparent;transition:color .2s,border-color .2s}
    .logout-btn:hover{color:var(--red);border-color:var(--red)}
    .upload-section{margin-bottom:2.5rem}
    .section-label{font-family:'DM Mono',monospace;font-size:.68rem;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem;display:flex;align-items:center;gap:.75rem}
    .section-label::after{content:'';flex:1;height:1px;background:var(--border)}
    .drop-zone{border:2px dashed var(--border);background:var(--cream);padding:3rem 2rem;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;position:relative}
    .drop-zone:hover,.drop-zone.drag-over{border-color:var(--red);background:#fff9f4}
    .drop-zone input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
    .drop-icon{font-size:2.5rem;color:var(--border);margin-bottom:1rem;transition:color .2s}
    .drop-zone:hover .drop-icon,.drop-zone.drag-over .drop-icon{color:var(--red)}
    .drop-text{font-size:1rem;margin-bottom:.4rem}
    .drop-meta{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--muted);letter-spacing:.06em}

    /* ── Format picker ── */
    .format-picker{display:flex;gap:1rem;margin:1rem 0 .5rem;justify-content:flex-start;flex-wrap:wrap}
    .format-option{display:flex;align-items:center;gap:.4rem;font-family:'DM Mono',monospace;font-size:.75rem;color:var(--ink);cursor:pointer;user-select:none}
    .format-option input[type="checkbox"]{accent-color:var(--red);width:15px;height:15px;cursor:pointer}
    .format-desc{font-size:.62rem;color:var(--muted);display:block;margin-left:19px;margin-top:1px}
    .format-label{font-family:'DM Mono',monospace;font-size:.65rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem}

    #progress-panel{display:none;background:var(--cream);border:1px solid var(--border);padding:1.5rem;margin-bottom:2.5rem}
    .progress-file{font-weight:600;font-size:.95rem;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
    .progress-file-icon{color:var(--red)}
    .progress-bar-track{height:4px;background:var(--border);margin-bottom:.75rem;position:relative;overflow:hidden}
    .progress-bar-fill{height:100%;background:var(--red);width:0%;transition:width .4s ease}
    .progress-bar-fill.indeterminate{width:40%!important;animation:slide 1.4s infinite}
    @keyframes slide{0%{transform:translateX(-150%)}100%{transform:translateX(350%)}}
    .progress-message{font-family:'DM Mono',monospace;font-size:.75rem;color:var(--muted);letter-spacing:.04em;margin-bottom:1rem}
    .progress-pct{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--ink);float:right}
    .download-btn{display:inline-flex;align-items:center;gap:.5rem;padding:.55rem 1rem;background:var(--green);color:#fff;text-decoration:none;font-family:'DM Mono',monospace;font-size:.72rem;letter-spacing:.06em;transition:background .2s,transform .1s;cursor:pointer;border:none}
    .download-btn:hover{background:#1e4d39;transform:translate(-1px,-1px)}
    .download-btn.secondary{background:var(--ink)}
    .download-btn.secondary:hover{background:#333}
    .error-msg{font-family:'DM Mono',monospace;font-size:.78rem;color:var(--red);background:#fdf0ee;border-left:3px solid var(--red);padding:.6rem .8rem;margin-top:.5rem}

    /* ── History cards ── */
    .history-card{background:var(--cream);border:1px solid var(--border);padding:1rem 1.2rem;margin-bottom:.75rem;transition:border-color .15s}
    .history-card:hover{border-color:var(--red)}
    .history-card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:.75rem;margin-bottom:.6rem}
    .history-card-left{flex:1;min-width:0}
    .history-card-filename{font-weight:600;font-size:.88rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:.25rem}
    .history-card-meta{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--muted);letter-spacing:.04em;display:flex;flex-wrap:wrap;gap:.3rem .8rem}
    .history-card-right{display:flex;align-items:center;gap:.5rem;flex-shrink:0}

    .status-badge{display:inline-block;padding:.15rem .5rem;font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.06em;text-transform:uppercase;font-weight:500}
    .status-badge.queued{background:#eee8dc;color:var(--muted)}
    .status-badge.processing{background:#fef3cd;color:#856404}
    .status-badge.done{background:#d4edda;color:var(--green)}
    .status-badge.failed{background:#f8d7da;color:var(--red)}
    .status-badge.pending{background:#e8e8ff;color:#4444aa}
    .status-badge.stopped{background:#ffe8e8;color:#aa4444}
    .status-badge.paused{background:#dbeafe;color:var(--blue)}

    /* ── Processing detail row ── */
    .history-card-detail{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted);margin-bottom:.6rem;letter-spacing:.03em}
    .history-card-detail .detail-message{color:var(--ink)}
    .history-card-progress{height:3px;background:var(--border);margin-bottom:.6rem;overflow:hidden;border-radius:1px}
    .history-card-progress-fill{height:100%;background:var(--red);transition:width .4s ease}
    .history-card-progress-fill.indeterminate{width:40%!important;animation:slide 1.4s infinite}

    /* ── Format tags ── */
    .format-tags{display:flex;gap:.35rem;flex-wrap:wrap;margin-bottom:.6rem}
    .format-tag{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.06em;text-transform:uppercase;padding:.15rem .45rem;border:1px solid var(--border);color:var(--muted);background:var(--paper)}
    .format-tag.ready{border-color:var(--green);color:var(--green);background:#edf7f1}
    .format-tag.failed-tag{border-color:var(--red);color:var(--red);background:#fdf0ee;text-decoration:line-through}

    /* ── Action buttons row ── */
    .history-card-actions{display:flex;gap:.4rem;flex-wrap:wrap;align-items:center}
    .action-btn{font-family:'DM Mono',monospace;font-size:.72rem;letter-spacing:.05em;padding:.25rem .6rem;border:none;cursor:pointer;transition:background .15s,transform .1s}
    .action-btn:hover{transform:translate(-1px,-1px)}
    .btn-start{background:var(--green);color:#fff}.btn-start:hover{background:#1e4d39}
    .btn-pause{background:var(--blue);color:#fff}.btn-pause:hover{background:#1d4ed8}
    .btn-stop{background:var(--amber);color:#fff}.btn-stop:hover{background:#8a5000}
    .btn-delete{background:var(--red);color:#fff}.btn-delete:hover{background:var(--red-dim)}
    .dl-link{display:inline-flex;align-items:center;gap:.3rem;padding:.25rem .6rem;background:var(--green);color:#fff;text-decoration:none;font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.05em;transition:background .15s,transform .1s;cursor:pointer;border:none}
    .dl-link:hover{background:#1e4d39;transform:translate(-1px,-1px)}
    .dl-link.secondary{background:var(--ink)}
    .dl-link.secondary:hover{background:#333}

    .empty-history{font-family:'DM Mono',monospace;font-size:.75rem;color:var(--muted);padding:1.5rem 0;text-align:center;letter-spacing:.05em}
    .toast{position:fixed;bottom:2rem;right:2rem;background:var(--ink);color:var(--paper);padding:.75rem 1.25rem;font-family:'DM Mono',monospace;font-size:.78rem;letter-spacing:.05em;opacity:0;transform:translateY(10px);transition:opacity .3s,transform .3s;z-index:200;pointer-events:none}
    .toast.show{opacity:1;transform:translateY(0)}

    /* ── Error in history card ── */
    .history-card-error{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--red);background:#fdf0ee;border-left:3px solid var(--red);padding:.4rem .6rem;margin-bottom:.6rem}
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="brand">
      <span class="brand-mark">文</span>
      <div>
        <span class="brand-title">OCR for Imaged PDF</span>
        <span class="brand-sub">Gemini · CJK · Vertical Text</span>
      </div>
    </div>
    <a href="/auth/logout" class="logout-btn">Sign out ↗</a>
  </header>

  <!-- Upload -->
  <div class="upload-section">
    <div class="section-label">New Conversion</div>
    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept=".pdf"/>
      <div class="drop-icon">⬆</div>
      <div class="drop-text">Drop PDF here or click to browse</div>
      <div class="drop-meta">Max 100 MB · Image-based PDF · CJK + English</div>
    </div>
  </div>

  <!-- Progress panel (active job) -->
  <div id="progress-panel">
    <div class="progress-file">
      <span class="progress-file-icon">📄</span>
      <span id="progress-filename">—</span>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:baseline">
      <div class="progress-message" id="progress-message">Starting…</div>
      <div class="progress-pct" id="progress-pct">0%</div>
    </div>
    <div class="progress-bar-track"><div class="progress-bar-fill" id="progress-bar"></div></div>
    <!-- Format picker shown after upload, hidden once job starts -->
    <div id="format-section" style="display:none">
      <div class="format-label">Output formats</div>
      <div class="format-picker" id="format-picker">
        <label class="format-option">
          <input type="checkbox" value="epub"/>
          EPUB
          <span class="format-desc">E-reader format</span>
        </label>
        <label class="format-option">
          <input type="checkbox" value="textlayer" checked/>
          Searchable PDF
          <span class="format-desc">Original + text layer</span>
        </label>
        <label class="format-option">
          <input type="checkbox" value="clean"/>
          Clean PDF
          <span class="format-desc">Re-typeset text</span>
        </label>
      </div>
    </div>
    <div id="progress-actions"></div>
  </div>

  <!-- Job History -->
  <div id="history-section">
    <div class="section-label">Job History</div>
    <div id="history-content"><div class="empty-history">No conversions yet.</div></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
let currentJobId = null, pollInterval = null;
const $ = id => document.getElementById(id);
const dropZone=$('drop-zone'),fileInput=$('file-input'),progressPanel=$('progress-panel'),
  progressBar=$('progress-bar'),progressMsg=$('progress-message'),progressPct=$('progress-pct'),
  progressFn=$('progress-filename'),progressActs=$('progress-actions'),
  historyContent=$('history-content'),toast=$('toast'),
  formatSection=$('format-section');

function showToast(m,d=3000){toast.textContent=m;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),d)}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtDate(ts){if(!ts)return'—';const d=new Date(ts*1000);return d.toLocaleDateString()+' '+d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}

/* ── Format helpers ── */
const FORMAT_LABELS = {
  epub:      'EPUB',
  textlayer: 'Searchable PDF',
  clean:     'Clean PDF',
};

function getSelectedFormats(){
  const cbs=document.querySelectorAll('#format-picker input[type="checkbox"]:checked');
  const f=Array.from(cbs).map(c=>c.value);
  return f.length?f:['epub'];
}

/* ── Drag & drop ── */
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('drag-over')});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('drag-over');if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0])});
fileInput.addEventListener('change',()=>{if(fileInput.files[0])handleFile(fileInput.files[0])});

async function handleFile(file){
  if(!file.name.toLowerCase().endsWith('.pdf'))return showToast('Please select a PDF file.');
  if(file.size>100*1024*1024)return showToast('File exceeds 100 MB limit.');
  progressPanel.style.display='block';progressFn.textContent=file.name;
  progressMsg.textContent='Uploading…';progressPct.textContent='';progressActs.innerHTML='';
  progressBar.style.width='0%';progressBar.classList.add('indeterminate');
  formatSection.style.display='none';
  const fd=new FormData();
  fd.append('file',file);
  try{
    const res=await fetch('/api/upload',{method:'POST',body:fd});
    if(!res.ok){const e=await res.json().catch(()=>({detail:'Upload failed.'}));throw new Error(e.detail||'Upload failed.')}
    const data=await res.json();
    currentJobId=data.job_id;
    progressBar.classList.remove('indeterminate');progressBar.style.width='0%';
    const p=data.page_count||0;
    progressMsg.textContent=p?`Uploaded · ${p} pages · choose formats below`:'Uploaded · choose formats below';
    progressPct.textContent='';
    formatSection.style.display='block';
    renderPendingActions(currentJobId);
    loadHistory();
  }catch(e){
    progressBar.classList.remove('indeterminate');progressMsg.textContent='Upload failed.';
    progressActs.innerHTML=`<div class="error-msg">${esc(e.message)}</div>`;showToast('Upload failed: '+e.message);
  }
}

function renderPendingActions(id){
  const i=esc(id);
  progressActs.innerHTML=`<div style="display:flex;gap:.5rem;margin-top:.5rem">
    <button class="action-btn btn-start" data-action="start" data-job-id="${i}">▶ Start</button>
    <button class="action-btn btn-delete" data-action="delete-current" data-job-id="${i}">✕ Delete</button></div>`;
}
function renderStoppedActions(id){
  const i=esc(id);
  formatSection.style.display='block';
  progressActs.innerHTML=`<div style="display:flex;gap:.5rem;margin-top:.5rem">
    <button class="action-btn btn-start" data-action="start" data-job-id="${i}">▶ Restart</button>
    <button class="action-btn btn-delete" data-action="delete-current" data-job-id="${i}">✕ Delete</button></div>`;
}
function renderPausedActions(id){
  const i=esc(id);
  formatSection.style.display='block';
  progressActs.innerHTML=`<div style="display:flex;gap:.5rem;margin-top:.5rem">
    <button class="action-btn btn-start" data-action="start" data-job-id="${i}">▶ Resume</button>
    <button class="action-btn btn-delete" data-action="delete-current" data-job-id="${i}">✕ Delete</button></div>`;
}

async function startJob(id){
  try{
    const fmts=getSelectedFormats();
    const res=await fetch(`/api/start/${id}`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({output_formats:fmts})
    });
    if(!res.ok){const e=await res.json().catch(()=>({detail:'Start failed.'}));throw new Error(e.detail)}
    formatSection.style.display='none';
    progressMsg.textContent='Queued · '+fmts.map(f=>FORMAT_LABELS[f]||f).join(', ');
    progressPct.textContent='0%';
    const i=esc(id);
    progressActs.innerHTML=`<div style="display:flex;gap:.5rem;margin-top:.5rem">
      <button class="action-btn btn-pause" data-action="pause" data-job-id="${i}">⏸ Pause</button>
      <button class="action-btn btn-stop" data-action="stop" data-job-id="${i}">⏹ Stop</button></div>`;
    startPolling(id);loadHistory();
  }catch(e){showToast('Start failed: '+e.message)}
}

async function pauseJob(id){
  try{const res=await fetch(`/api/pause/${id}`,{method:'POST'});if(!res.ok)throw new Error('Pause failed.');showToast('Pause requested.')}catch(e){showToast(e.message)}
}

async function stopJob(id){
  try{const res=await fetch(`/api/stop/${id}`,{method:'POST'});if(!res.ok)throw new Error('Stop failed.');showToast('Stop requested.')}catch(e){showToast(e.message)}
}
async function deleteJob(id,isCurrent=false){
  if(!confirm('Delete this job and its files?'))return;
  try{const res=await fetch(`/api/delete/${id}`,{method:'DELETE'});if(!res.ok)throw new Error('Delete failed.');
    if(isCurrent){if(pollInterval){clearInterval(pollInterval);pollInterval=null}currentJobId=null;progressPanel.style.display='none'}
    showToast('Deleted.');loadHistory();
  }catch(e){showToast(e.message)}
}

function startPolling(id){if(pollInterval)clearInterval(pollInterval);pollInterval=setInterval(()=>pollStatus(id),5000);pollStatus(id)}
async function pollStatus(id){
  try{const res=await fetch(`/api/status/${id}`);if(!res.ok)return;const job=await res.json();
    updateProgressUI(job);
    if(['done','failed','stopped','paused'].includes(job.status)){clearInterval(pollInterval);pollInterval=null;loadHistory()}
  }catch(_){}
}

function buildDownloadButtons(job){
  const id=esc(job.job_id);
  let btns=[];
  const fmts=job.output_formats||['epub'];
  if(fmts.includes('epub')&&job.epub_path)
    btns.push(`<a class="download-btn" href="/api/download/${id}" download>↓ EPUB</a>`);
  if(fmts.includes('textlayer')&&job.textlayer_path)
    btns.push(`<a class="download-btn secondary" href="/api/download/${id}/textlayer" download>↓ Searchable PDF</a>`);
  if(fmts.includes('clean')&&job.clean_pdf_path)
    btns.push(`<a class="download-btn secondary" href="/api/download/${id}/clean" download>↓ Clean PDF</a>`);
  btns.push(`<button class="action-btn btn-delete" data-action="delete-current" data-job-id="${id}">✕</button>`);
  return btns.join(' ');
}

function updateProgressUI(job){
  progressMsg.textContent=job.message||job.status;
  const pct=job.progress||0;progressPct.textContent=`${pct}%`;progressBar.style.width=`${pct}%`;
  if(job.status==='queued')progressBar.classList.add('indeterminate');else progressBar.classList.remove('indeterminate');
  progressActs.innerHTML='';const id=esc(job.job_id);
  if(job.status==='done'){
    formatSection.style.display='none';
    progressActs.innerHTML=`<div style="display:flex;gap:.5rem;margin-top:.5rem;align-items:center;flex-wrap:wrap">${buildDownloadButtons(job)}</div>`;
    showToast('Conversion complete!');
  }else if(job.status==='failed'){
    formatSection.style.display='none';
    progressActs.innerHTML=`<div class="error-msg">${esc(job.error||'Conversion failed.')}</div>
      <div style="display:flex;gap:.5rem;margin-top:.5rem">
        <button class="action-btn btn-start" data-action="start" data-job-id="${id}">▶ Retry</button>
        <button class="action-btn btn-delete" data-action="delete-current" data-job-id="${id}">✕</button></div>`;
  }else if(job.status==='stopped'){renderStoppedActions(job.job_id)}
  else if(job.status==='paused'){renderPausedActions(job.job_id)}
  else if(job.status==='pending'){
    formatSection.style.display='block';
    renderPendingActions(job.job_id);
  }else{
    formatSection.style.display='none';
    progressActs.innerHTML=`<div style="display:flex;gap:.5rem;margin-top:.5rem">
    <button class="action-btn btn-pause" data-action="pause" data-job-id="${id}">⏸ Pause</button>
    <button class="action-btn btn-stop" data-action="stop" data-job-id="${id}">⏹ Stop</button></div>`;
  }
}

/* ══════════════════════════════════════════════════════════════════════════
   HISTORY — card-based layout with full detail
   ══════════════════════════════════════════════════════════════════════════ */

function buildFormatTags(job) {
  const fmts = job.output_formats || ['epub'];
  return fmts.map(f => {
    const label = FORMAT_LABELS[f] || f;
    let cls = 'format-tag';
    if (job.status === 'done') {
      const pathKey = f === 'epub' ? 'epub_path' : f === 'textlayer' ? 'textlayer_path' : 'clean_pdf_path';
      if (job[pathKey]) {
        cls += ' ready';
      } else {
        cls += ' failed-tag';
      }
    }
    return `<span class="${cls}">${esc(label)}</span>`;
  }).join('');
}

function buildHistoryDownloadLinks(job) {
  const id = esc(job.job_id);
  let links = [];
  const fmts = job.output_formats || ['epub'];
  if (fmts.includes('epub') && job.epub_path)
    links.push(`<a class="dl-link" href="/api/download/${id}" download>↓ EPUB</a>`);
  if (fmts.includes('textlayer') && job.textlayer_path)
    links.push(`<a class="dl-link secondary" href="/api/download/${id}/textlayer" download>↓ Searchable PDF</a>`);
  if (fmts.includes('clean') && job.clean_pdf_path)
    links.push(`<a class="dl-link secondary" href="/api/download/${id}/clean" download>↓ Clean PDF</a>`);
  return links.join('');
}

function renderHistoryCard(job) {
  const id = esc(job.job_id);
  const pages = job.page_count ? `${job.page_count} pp` : '—';
  const created = fmtDate(job.created_at);
  const formatTags = buildFormatTags(job);
  const isActive = ['queued', 'processing'].includes(job.status);
  const pct = job.progress || 0;

  let detailHTML = '';
  let progressHTML = '';
  let actionsHTML = '';
  let errorHTML = '';

  if (isActive) {
    const msg = job.message || job.status;
    detailHTML = `<div class="history-card-detail">
      <span class="detail-message">${esc(msg)}</span> · ${pct}%
    </div>`;
    const barCls = job.status === 'queued' ? 'history-card-progress-fill indeterminate' : 'history-card-progress-fill';
    progressHTML = `<div class="history-card-progress">
      <div class="${barCls}" style="width:${pct}%"></div>
    </div>`;
  } else if (job.status === 'done') {
    detailHTML = `<div class="history-card-detail">
      <span class="detail-message">Complete</span> · ${pages}
    </div>`;
  } else if (job.status === 'failed') {
    detailHTML = `<div class="history-card-detail">
      <span class="detail-message">Failed</span> · ${pages}
    </div>`;
    if (job.error) {
      errorHTML = `<div class="history-card-error">${esc(job.error)}</div>`;
    }
  } else if (job.status === 'stopped') {
    detailHTML = `<div class="history-card-detail">
      <span class="detail-message">Stopped by user</span> · ${pages}
    </div>`;
  } else if (job.status === 'paused') {
    detailHTML = `<div class="history-card-detail">
      <span class="detail-message">Paused by user</span> · ${pages} · ${pct}%
    </div>`;
  } else if (job.status === 'pending') {
    detailHTML = `<div class="history-card-detail">
      <span class="detail-message">Waiting to start</span> · ${pages}
    </div>`;
  }

  if (job.status === 'done') {
    const dlLinks = buildHistoryDownloadLinks(job);
    actionsHTML = `<div class="history-card-actions">
      ${dlLinks}
      <button class="action-btn btn-delete" data-action="history-delete" data-job-id="${id}" title="Delete job and files">✕</button>
    </div>`;
  } else if (['pending', 'stopped', 'failed', 'paused'].includes(job.status)) {
    const label = job.status === 'pending' ? '▶ Start' : job.status === 'paused' ? '▶ Resume' : job.status === 'stopped' ? '▶ Restart' : '▶ Retry';
    actionsHTML = `<div class="history-card-actions">
      <button class="action-btn btn-start" data-action="history-start" data-job-id="${id}">${label}</button>
      <button class="action-btn btn-delete" data-action="history-delete" data-job-id="${id}" title="Delete job and files">✕</button>
    </div>`;
  } else if (isActive) {
    actionsHTML = `<div class="history-card-actions">
      <button class="action-btn btn-pause" data-action="history-pause" data-job-id="${id}">⏸ Pause</button>
      <button class="action-btn btn-stop" data-action="history-stop" data-job-id="${id}">⏹ Stop</button>
    </div>`;
  }

  return `<div class="history-card" data-job-id="${id}">
    <div class="history-card-header">
      <div class="history-card-left">
        <div class="history-card-filename" title="${esc(job.filename)}">${esc(job.filename)}</div>
        <div class="history-card-meta">
          <span>${pages}</span>
          <span>${created}</span>
        </div>
      </div>
      <div class="history-card-right">
        <span class="status-badge ${esc(job.status)}">${esc(job.status)}</span>
      </div>
    </div>
    ${detailHTML}
    ${progressHTML}
    <div class="format-tags">${formatTags}</div>
    ${errorHTML}
    ${actionsHTML}
  </div>`;
}

async function loadHistory() {
  try {
    const res = await fetch('/api/history');
    if (!res.ok) return;
    const jobs = await res.json();
    if (!jobs.length) {
      historyContent.innerHTML = '<div class="empty-history">No conversions yet.</div>';
      return;
    }
    historyContent.innerHTML = jobs.map(renderHistoryCard).join('');
  } catch(_) {}
}

/* ── Resume polling for any active jobs on page load ── */
async function resumeActiveJobs() {
  try {
    const res = await fetch('/api/history');
    if (!res.ok) return;
    const jobs = await res.json();
    for (const job of jobs) {
      if (['queued', 'processing'].includes(job.status)) {
        currentJobId = job.job_id;
        progressPanel.style.display = 'block';
        progressFn.textContent = job.filename || '';
        formatSection.style.display = 'none';
        updateProgressUI(job);
        startPolling(job.job_id);
        break;
      }
    }
  } catch(_) {}
}

/* ── History actions ── */
async function historyStartJob(id) {
  currentJobId = id;
  progressPanel.style.display = 'block';
  try {
    const r = await fetch(`/api/status/${id}`);
    if (r.ok) {
      const j = await r.json();
      progressFn.textContent = j.filename || '';
    }
  } catch(_) {}
  progressMsg.textContent = 'Choose formats, then start';
  progressPct.textContent = '';
  progressBar.style.width = '0%';
  progressActs.innerHTML = '';
  formatSection.style.display = 'block';
  renderPendingActions(id);
}

async function historyPauseJob(id) {
  try {
    await fetch(`/api/pause/${id}`, {method: 'POST'});
    showToast('Pause requested.');
    loadHistory();
  } catch(e) { showToast(e.message); }
}

async function historyStopJob(id) {
  try {
    await fetch(`/api/stop/${id}`, {method: 'POST'});
    showToast('Stop requested.');
    loadHistory();
  } catch(e) { showToast(e.message); }
}

async function historyDeleteJob(id) {
  if (!confirm('Delete this job and its files?')) return;
  try {
    await fetch(`/api/delete/${id}`, {method: 'DELETE'});
    if (id === currentJobId) {
      if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
      currentJobId = null;
      progressPanel.style.display = 'none';
    }
    showToast('Deleted.');
    loadHistory();
  } catch(e) { showToast(e.message); }
}

/* ── Delegated click handler ── */
document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const a = b.dataset.action, id = b.dataset.jobId;
  if (a === 'start') startJob(id);
  else if (a === 'pause') pauseJob(id);
  else if (a === 'stop') stopJob(id);
  else if (a === 'delete-current') deleteJob(id, true);
  else if (a === 'history-start') historyStartJob(id);
  else if (a === 'history-pause') historyPauseJob(id);
  else if (a === 'history-stop') historyStopJob(id);
  else if (a === 'history-delete') historyDeleteJob(id);
});

/* ── Auto-refresh history for active jobs ── */
let historyRefreshInterval = null;
function startHistoryRefresh() {
  if (historyRefreshInterval) return;
  historyRefreshInterval = setInterval(async () => {
    try {
      const res = await fetch('/api/history');
      if (!res.ok) return;
      const jobs = await res.json();
      const hasActive = jobs.some(j => ['queued', 'processing'].includes(j.status));
      historyContent.innerHTML = jobs.length
        ? jobs.map(renderHistoryCard).join('')
        : '<div class="empty-history">No conversions yet.</div>';
      if (!hasActive) {
        clearInterval(historyRefreshInterval);
        historyRefreshInterval = null;
      }
    } catch(_) {}
  }, 5000);
}

/* ── Init ── */
loadHistory();
resumeActiveJobs();
fetch('/api/history').then(r=>r.json()).then(jobs=>{
  if(jobs.some(j=>['queued','processing'].includes(j.status))) startHistoryRefresh();
}).catch(()=>{});
</script>
