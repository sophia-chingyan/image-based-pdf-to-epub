<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PDF → EPUB · Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --ink:     #1a1614;
      --paper:   #f5f0e8;
      --red:     #c0392b;
      --muted:   #7a6e65;
      --border:  #d4c9b8;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--paper);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Shippori Mincho', serif;
      color: var(--ink);
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(
        90deg,
        transparent,
        transparent 60px,
        rgba(0,0,0,0.04) 60px,
        rgba(0,0,0,0.04) 61px
      );
      pointer-events: none;
    }

    .card {
      position: relative;
      background: #fffdf8;
      border: 1px solid var(--border);
      padding: 3.5rem 3rem;
      width: min(420px, 90vw);
      text-align: center;
      box-shadow: 4px 4px 0 var(--border);
    }

    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      border-color: var(--red);
      border-style: solid;
    }
    .card::before {
      top: 10px; left: 10px;
      border-width: 2px 0 0 2px;
    }
    .card::after {
      bottom: 10px; right: 10px;
      border-width: 0 2px 2px 0;
    }

    .logo-mark {
      font-size: 3rem;
      line-height: 1;
      color: var(--red);
      margin-bottom: 0.5rem;
      letter-spacing: -0.05em;
    }

    .title {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: 0.02em;
      color: var(--ink);
      margin-bottom: 0.3rem;
    }

    .subtitle {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--red);
      margin: 0 auto 2.5rem;
    }

    /* ── Google button ── */
    .sign-in-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      width: 100%;
      padding: 0.9rem 1.5rem;
      background: var(--ink);
      color: var(--paper);
      border: none;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-decoration: none;
      transition: background 0.2s, transform 0.1s;
    }

    .sign-in-btn:hover {
      background: var(--red);
      transform: translate(-2px, -2px);
      box-shadow: 2px 2px 0 var(--border);
    }

    .sign-in-btn:active {
      transform: translate(0, 0);
      box-shadow: none;
    }

    .google-icon {
      width: 18px; height: 18px;
      flex-shrink: 0;
    }

    .footnote {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 2rem;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-mark">文</div>
    <div class="title">PDF → EPUB</div>
    <div class="subtitle">Image PDF · CJK · Vertical Text</div>
    <div class="divider"></div>

    <!-- Google OAuth -->
    <a href="/auth/login" class="sign-in-btn">
      <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </a>

    <p class="footnote">Private · Single-user · Self-hosted</p>
  </div>
</body>
</html>
